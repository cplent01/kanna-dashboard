<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanna Fitness — GM Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A3A5C;--navy2:#2A527F;--blue:#3B7DD8;--blue-lt:#EBF2FC;
  --green:#2D8A5E;--green-lt:#E6F5EE;--amber:#C47E1A;--amber-lt:#FDF3E3;
  --red:#C94040;--red-lt:#FDEAEA;
  --g50:#F7F8FA;--g100:#EEF0F4;--g200:#D8DCE5;--g400:#9BA3B8;--g500:#7A8299;--g800:#2C3347;
  --white:#fff;--r:10px;--r-sm:6px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--g50);color:var(--g800);font-size:14px;min-height:100vh}

/* topbar */
.topbar{background:var(--navy);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:14px}
.logo{width:34px;height:34px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;color:#fff}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.pill{font-size:11px;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);border-radius:20px;padding:3px 12px;cursor:pointer;border:none;font-family:var(--font);transition:background .15s}
.pill:hover{background:rgba(255,255,255,0.15)}
.pill.editing{background:rgba(59,125,216,0.4);color:#fff}

/* month bar */
.month-bar{background:var(--white);border-bottom:1px solid var(--g100);padding:0 28px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;height:44px}
.month-bar::-webkit-scrollbar{display:none}
.mbtn{flex-shrink:0;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font);border:1px solid transparent;cursor:pointer;background:transparent;color:var(--g500);transition:all .15s}
.mbtn:hover{background:var(--g100);color:var(--g800)}
.mbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mbtn:disabled{opacity:0.35;cursor:default}

/* layout */
.content{padding:24px 28px 60px;max-width:1100px}
.slabel{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:12px;margin-top:28px}
.slabel:first-child{margin-top:0}

/* score grid */
.sg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.sg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.sg2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}

.sc{background:var(--white);border-radius:var(--r);padding:16px 18px;border:1px solid var(--g100);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--g200)}
.sc.cb::before{background:var(--blue)}
.sc.cg::before{background:var(--green)}
.sc.ca::before{background:var(--amber)}
.sc.cr::before{background:var(--red)}
.sc.cn::before{background:var(--navy)}
.sc-label{font-size:11px;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.sc-value{font-size:26px;font-weight:600;color:var(--g800);font-variant-numeric:tabular-nums;letter-spacing:-.5px;line-height:1;margin-bottom:6px}
.sc-meta{font-size:12px;color:var(--g500);display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.delta{font-size:11px;font-weight:500;padding:1px 6px;border-radius:4px;font-variant-numeric:tabular-nums}
.delta.up{background:var(--green-lt);color:var(--green)}
.delta.dn{background:var(--red-lt);color:var(--red)}
.delta.nu{background:var(--g100);color:var(--g500)}

.tchip{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px}
.tchip.ok{background:var(--green-lt);color:var(--green)}
.tchip.warn{background:var(--amber-lt);color:var(--amber)}
.tchip.bad{background:var(--red-lt);color:var(--red)}

/* chart cards */
.cr21{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:12px}
.cr3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.cc{background:var(--white);border:1px solid var(--g100);border-radius:var(--r);padding:18px 20px}
.cc-title{font-size:13px;font-weight:600;color:var(--g800);margin-bottom:2px}
.cc-sub{font-size:11px;color:var(--g500);margin-bottom:16px}
.cw{position:relative;width:100%}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:6px}
.fs{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:var(--r-sm);font-size:13px}
.fs-name{font-weight:500}
.fs-right{display:flex;gap:14px;align-items:center}
.fs-count{font-variant-numeric:tabular-nums;font-weight:600}
.fs-rate{font-size:11px;opacity:.6}

/* data entry modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:28px 32px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--g800)}
.modal-sub{font-size:13px;color:var(--g500);margin-bottom:20px;line-height:1.5}
.modal label{font-size:12px;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;margin-top:16px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select{width:100%;height:38px;border:1px solid var(--g200);border-radius:8px;padding:0 12px;font-family:var(--font);font-size:14px;color:var(--g800);outline:none;transition:border .15s}
.modal input:focus,.modal select:focus{border-color:var(--blue)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-section{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;margin-top:22px;margin-bottom:4px;padding-bottom:6px;border-bottom:1px solid var(--g100)}
.modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.btn-cancel{padding:8px 20px;border-radius:8px;border:1px solid var(--g200);background:transparent;font-family:var(--font);font-size:14px;color:var(--g500);cursor:pointer}
.btn-cancel:hover{background:var(--g100)}
.btn-save{padding:8px 24px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--navy2)}

/* empty state */
.empty{text-align:center;padding:60px 20px;color:var(--g400)}
.empty-title{font-size:16px;font-weight:500;margin-bottom:8px;color:var(--g500)}
.empty-sub{font-size:13px;line-height:1.6}

/* no data badge */
.no-data{display:inline-block;font-size:11px;color:var(--g400);font-style:italic}

@media(max-width:700px){
  .topbar,.month-bar{padding:0 16px}
  .content{padding:16px 16px 48px}
  .sg4,.sg3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .cr21,.cr3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tl">
    <div class="logo">KF</div>
    <div>
      <div class="topbar-title">Kanna Fitness</div>
      <div class="topbar-sub">GM Dashboard</div>
    </div>
  </div>
  <button class="pill" id="edit-btn" onclick="openModal(null)">+ Add / edit month</button>
</div>

<!-- Month selector -->
<div class="month-bar" id="month-bar"></div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Data entry modal -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal">
  <h2 id="modal-title">Add month data</h2>
  <p class="modal-sub">Copy numbers from the LS Feed tab in your Google Sheet and paste them here. Only fill what you have — blank fields are skipped.</p>

  <label>Month (e.g. Mar 2026)</label>
  <input type="text" id="f-month" placeholder="Mar 2026">

  <div class="modal-section">Finances</div>
  <div class="modal-grid">
    <div><label>Gross Revenue ($)</label><input type="number" id="f-rev" placeholder="35000"></div>
    <div><label>OpEx ($)</label><input type="number" id="f-opex" placeholder="7500"></div>
    <div><label>Payroll ($)</label><input type="number" id="f-payroll" placeholder="11000"></div>
    <div><label>Profit this month ($)</label><input type="number" id="f-profit" placeholder="14000"></div>
    <div><label>OpEx % (e.g. 23.4)</label><input type="number" id="f-opex-pct" placeholder="23.4" step="0.1"></div>
    <div><label>Payroll % (e.g. 38.2)</label><input type="number" id="f-payroll-pct" placeholder="38.2" step="0.1"></div>
    <div><label>Profit % (e.g. 37.0)</label><input type="number" id="f-profit-pct" placeholder="37.0" step="0.1"></div>
  </div>

  <div class="modal-section">Members</div>
  <div class="modal-grid">
    <div><label>Active Members</label><input type="number" id="f-members" placeholder="184"></div>
    <div><label>Paying Members</label><input type="number" id="f-paying" placeholder="173"></div>
    <div><label>Cancellations</label><input type="number" id="f-cancel" placeholder="5"></div>
    <div><label>Attrition % (e.g. 2.7)</label><input type="number" id="f-attrition" placeholder="2.7" step="0.1"></div>
    <div><label>ARM ($)</label><input type="number" id="f-arm" placeholder="177"></div>
    <div><label>New Members Closed</label><input type="number" id="f-closed" placeholder="11"></div>
  </div>

  <div class="modal-section">Leads & Sales</div>
  <div class="modal-grid">
    <div><label>Leads</label><input type="number" id="f-leads" placeholder="22"></div>
    <div><label>Intros Set</label><input type="number" id="f-set" placeholder="17"></div>
    <div><label>Intros Shown</label><input type="number" id="f-shown" placeholder="14"></div>
    <div><label>Set Rate % (e.g. 77)</label><input type="number" id="f-set-rate" placeholder="77" step="0.1"></div>
    <div><label>Show Rate % (e.g. 82)</label><input type="number" id="f-show-rate" placeholder="82" step="0.1"></div>
    <div><label>Close Rate % (e.g. 79)</label><input type="number" id="f-close-rate" placeholder="79" step="0.1"></div>
    <div><label>Total Close Rate % (e.g. 50)</label><input type="number" id="f-total-close" placeholder="50" step="0.1"></div>
    <div><label>Ad Spend ($)</label><input type="number" id="f-adspend" placeholder="495"></div>
    <div><label>Cost per Lead ($)</label><input type="number" id="f-cpl" placeholder="22"></div>
    <div><label>Cost per Client ($)</label><input type="number" id="f-cpc" placeholder="45"></div>
  </div>

  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn-save" onclick="saveMonth()">Save month</button>
  </div>
</div>
</div>

<script>
// ── data store (persists in localStorage) ────────────────────────────────
const STORE_KEY = 'kanna_dashboard_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : { months: defaultData() };
  } catch(e) { return { months: defaultData() }; }
}

function saveData(d) {
  localStorage.setItem(STORE_KEY, JSON.stringify(d));
}

function defaultData() {
  return [
    { month:'Jan 2026', rev:32507, opex:7604, payroll:11249, profit:13654,
      opexPct:23.4, payrollPct:34.6, profitPct:42.0,
      members:184, paying:173, cancel:5, attritionPct:2.7, arm:177, closed:0,
      leads:0, set:0, shown:0, setPct:0, showPct:0, closePct:0, totalClosePct:0,
      adSpend:0, cpl:0, cpc:0 },
    { month:'Feb 2026', rev:24600, opex:6120, payroll:9563, profit:8917,
      opexPct:24.9, payrollPct:38.9, profitPct:36.2,
      members:181, paying:170, cancel:7, attritionPct:3.8, arm:136, closed:0,
      leads:0, set:0, shown:0, setPct:0, showPct:0, closePct:0, totalClosePct:0,
      adSpend:0, cpl:0, cpc:0 },
  ];
}

let DB = loadData();
let selectedIdx = DB.months.length - 1;

// ── format helpers ────────────────────────────────────────────────────────
const $  = v => '$' + Math.round(v||0).toLocaleString();
const pct = v => (v||0).toFixed(1) + '%';
const num = v => Math.round(v||0).toLocaleString();

function delta(curr, prev, lowerBetter) {
  if (!prev || prev === 0) return '<span class="delta nu">—</span>';
  const chg = curr - prev;
  const p   = Math.round(Math.abs(chg / prev) * 100);
  const up  = lowerBetter ? chg < 0 : chg > 0;
  const sign = chg >= 0 ? '+' : '−';
  return `<span class="delta ${up?'up':'dn'}">${sign}${p}%</span>`;
}

function chip(val, target, lowerBetter, fmt) {
  if (!target) return '';
  const ok    = lowerBetter ? val <= target : val >= target;
  const close = lowerBetter ? val <= target * 1.25 : val >= target * 0.82;
  const cls   = ok ? 'ok' : close ? 'warn' : 'bad';
  const dot   = ok ? '●' : close ? '◑' : '○';
  return `<span class="tchip ${cls}">${dot} target ${fmt(target)}</span>`;
}

// ── month bar ─────────────────────────────────────────────────────────────
function buildMonthBar() {
  const bar = document.getElementById('month-bar');
  bar.innerHTML = '';
  DB.months.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mbtn' + (i === selectedIdx ? ' active' : '');
    btn.textContent = m.month;
    btn.onclick = () => { selectedIdx = i; buildMonthBar(); render(); };
    bar.appendChild(btn);
  });
  // + add button in bar
  const add = document.createElement('button');
  add.className = 'mbtn';
  add.textContent = '+ New month';
  add.style.color = 'var(--blue)';
  add.onclick = () => openModal(null);
  bar.appendChild(add);
}

// ── main render ───────────────────────────────────────────────────────────
let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

function render() {
  const m    = DB.months[selectedIdx];
  const prev = selectedIdx > 0 ? DB.months[selectedIdx - 1] : null;
  const all  = DB.months;

  document.getElementById('content').innerHTML =
    finSection(m, prev) +
    memSection(m, prev) +
    leadsSection(m, prev) +
    trendsSection(all);

  destroyCharts();
  drawCharts(all, m);
}

// ── Finance section ───────────────────────────────────────────────────────
function finSection(m, p) {
  return `
<p class="slabel">Finances — ${m.month}
  <span style="margin-left:12px;font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--g400);cursor:pointer;text-decoration:underline;" onclick="openModal(${selectedIdx})">edit</span>
</p>
<div class="sg4">
  <div class="sc cb">
    <div class="sc-label">Gross Revenue</div>
    <div class="sc-value">${$(m.rev)}</div>
    <div class="sc-meta">${delta(m.rev,p?.rev,false)} <span>vs prior month</span></div>
  </div>
  <div class="sc ca">
    <div class="sc-label">Payroll %</div>
    <div class="sc-value">${pct(m.payrollPct)}</div>
    <div class="sc-meta">${chip(m.payrollPct,45,true,pct)}</div>
  </div>
  <div class="sc ca">
    <div class="sc-label">OpEx %</div>
    <div class="sc-value">${pct(m.opexPct)}</div>
    <div class="sc-meta">${chip(m.opexPct,25,true,pct)}</div>
  </div>
  <div class="sc cg">
    <div class="sc-label">Profit %</div>
    <div class="sc-value">${pct(m.profitPct)}</div>
    <div class="sc-meta">${chip(m.profitPct,10,false,pct)}</div>
  </div>
</div>`;
}

// ── Members section ───────────────────────────────────────────────────────
function memSection(m, p) {
  const net = (m.closed||0) - (m.cancel||0);
  return `
<p class="slabel">Members</p>
<div class="sg4">
  <div class="sc cn">
    <div class="sc-label">Active Members</div>
    <div class="sc-value">${num(m.members)}</div>
    <div class="sc-meta"><span class="delta ${net>=0?'up':'dn'}">${net>=0?'+':''}${net} net</span><span>this month</span></div>
  </div>
  <div class="sc cg">
    <div class="sc-label">New Members</div>
    <div class="sc-value">${num(m.closed)}</div>
    <div class="sc-meta">${delta(m.closed,p?.closed,false)} <span>vs prior month</span></div>
  </div>
  <div class="sc cr">
    <div class="sc-label">Cancellations</div>
    <div class="sc-value">${num(m.cancel)}</div>
    <div class="sc-meta">${chip(m.cancel,3,true,num)}</div>
  </div>
  <div class="sc cb">
    <div class="sc-label">ARM</div>
    <div class="sc-value">${$(m.arm)}</div>
    <div class="sc-meta">${chip(m.arm,200,false,$)}</div>
  </div>
</div>`;
}

// ── Leads section ─────────────────────────────────────────────────────────
function leadsSection(m, p) {
  const hasLeads = m.leads > 0;
  const funnelHtml = [
    {label:'Leads',       count:m.leads,  rate:null,        bg:'#EBF2FC',col:'#1A3A5C'},
    {label:'Intros set',  count:m.set,    rate:m.setPct,    bg:'#C8DCF5',col:'#1A3A5C'},
    {label:'Intros shown',count:m.shown,  rate:m.showPct,   bg:'#9DC0ED',col:'#0C2E58'},
    {label:'Closed',      count:m.closed, rate:m.closePct,  bg:'#3B7DD8',col:'#fff'},
  ].map(s => `
    <div class="fs" style="background:${s.bg};color:${s.col}">
      <span class="fs-name">${s.label}</span>
      <div class="fs-right">
        ${s.rate ? `<span class="fs-rate" style="color:${s.col}">${pct(s.rate)}</span>` : ''}
        <span class="fs-count">${num(s.count)}</span>
      </div>
    </div>`).join('');

  return `
<p class="slabel">Leads & Sales</p>
<div class="sg3" style="margin-bottom:12px;">
  <div class="sc cb">
    <div class="sc-label">Total Close Rate</div>
    <div class="sc-value">${pct(m.totalClosePct)}</div>
    <div class="sc-meta">${chip(m.totalClosePct,50,false,pct)}</div>
  </div>
  <div class="sc">
    <div class="sc-label">Cost per Lead</div>
    <div class="sc-value">${$(m.cpl)}</div>
    <div class="sc-meta">${delta(m.cpl,p?.cpl,true)} <span>vs prior</span></div>
  </div>
  <div class="sc">
    <div class="sc-label">Cost per Client</div>
    <div class="sc-value">${$(m.cpc)}</div>
    <div class="sc-meta">${delta(m.cpc,p?.cpc,true)} <span>vs prior</span></div>
  </div>
</div>
<div class="cc">
  <div class="cc-title">Sales funnel — ${m.month}</div>
  <div class="cc-sub">lead → intro set → shown → closed</div>
  ${hasLeads ? `<div class="funnel">${funnelHtml}</div>` : '<p class="no-data">No leads data entered for this month yet.</p>'}
</div>`;
}

// ── Trends section ────────────────────────────────────────────────────────
function trendsSection(all) {
  return `
<p class="slabel">Trends — all months</p>
<div class="cr21" style="margin-bottom:12px;">
  <div class="cc">
    <div class="cc-title">Monthly revenue</div>
    <div class="cc-sub">gross revenue per month</div>
    <div class="cw" style="height:200px;"><canvas id="ch-rev"></canvas></div>
  </div>
  <div class="cc">
    <div class="cc-title">Active members</div>
    <div class="cc-sub">member count over time</div>
    <div class="cw" style="height:200px;"><canvas id="ch-mem"></canvas></div>
  </div>
</div>
<div class="cr3">
  <div class="cc">
    <div class="cc-title">Cost %</div>
    <div class="cc-sub">payroll & opex vs revenue</div>
    <div class="cw" style="height:180px;"><canvas id="ch-cost"></canvas></div>
  </div>
  <div class="cc">
    <div class="cc-title">Attrition %</div>
    <div class="cc-sub">monthly churn rate</div>
    <div class="cw" style="height:180px;"><canvas id="ch-attr"></canvas></div>
  </div>
  <div class="cc">
    <div class="cc-title">Close rate %</div>
    <div class="cc-sub">lead-to-member conversion</div>
    <div class="cw" style="height:180px;"><canvas id="ch-close"></canvas></div>
  </div>
</div>`;
}

// ── Charts ────────────────────────────────────────────────────────────────
function drawCharts(all, current) {
  const labels = all.map(m => m.month);
  const gc = 'rgba(0,0,0,0.05)';
  const tc = '#9BA3B8';
  const base = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{display:false},ticks:{color:tc,font:{size:10},maxRotation:45}},
      y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
    }
  };

  charts.rev = new Chart(document.getElementById('ch-rev'),{
    type:'bar',
    data:{labels,datasets:[{
      data:all.map(m=>m.rev),
      backgroundColor:all.map(m=>m.month===current.month?'#3B7DD8':'#C2D9F5'),
      borderRadius:5,
    }]},
    options:{...base,scales:{...base.scales,
      y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>'$'+Math.round(v/1000)+'K'}}}},
  });

  charts.mem = new Chart(document.getElementById('ch-mem'),{
    type:'line',
    data:{labels,datasets:[{
      data:all.map(m=>m.members),
      borderColor:'#1A3A5C',backgroundColor:'rgba(26,58,92,0.06)',
      fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#1A3A5C',
    }]},
    options:base,
  });

  charts.cost = new Chart(document.getElementById('ch-cost'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Payroll %',data:all.map(m=>+(m.payrollPct||0).toFixed(1)),backgroundColor:'#C47E1A',borderRadius:3},
      {label:'OpEx %',   data:all.map(m=>+(m.opexPct||0).toFixed(1)),   backgroundColor:'#D8DCE5',borderRadius:3},
    ]},
    options:{...base,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},color:tc,boxWidth:10,padding:6}}},
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:10},maxRotation:45}},
        y:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+'%'}},
      }},
  });

  charts.attr = new Chart(document.getElementById('ch-attr'),{
    type:'line',
    data:{labels,datasets:[{
      data:all.map(m=>+(m.attritionPct||0).toFixed(1)),
      borderColor:'#C94040',backgroundColor:'rgba(201,64,64,0.06)',
      fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#C94040',
    }]},
    options:{...base,scales:{...base.scales,
      y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}},
  });

  charts.close = new Chart(document.getElementById('ch-close'),{
    type:'line',
    data:{labels,datasets:[{
      data:all.map(m=>+(m.totalClosePct||0).toFixed(1)),
      borderColor:'#2D8A5E',backgroundColor:'rgba(45,138,94,0.06)',
      fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#2D8A5E',
    }]},
    options:{...base,scales:{...base.scales,
      y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}},
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────
let editingIdx = null;

function openModal(idx) {
  editingIdx = idx;
  const m = idx !== null ? DB.months[idx] : null;
  document.getElementById('modal-title').textContent = m ? 'Edit ' + m.month : 'Add month data';
  const set = (id, val) => { document.getElementById(id).value = val || ''; };

  set('f-month',      m?.month || '');
  set('f-rev',        m?.rev || '');
  set('f-opex',       m?.opex || '');
  set('f-payroll',    m?.payroll || '');
  set('f-profit',     m?.profit || '');
  set('f-opex-pct',   m?.opexPct || '');
  set('f-payroll-pct',m?.payrollPct || '');
  set('f-profit-pct', m?.profitPct || '');
  set('f-members',    m?.members || '');
  set('f-paying',     m?.paying || '');
  set('f-cancel',     m?.cancel || '');
  set('f-attrition',  m?.attritionPct || '');
  set('f-arm',        m?.arm || '');
  set('f-closed',     m?.closed || '');
  set('f-leads',      m?.leads || '');
  set('f-set',        m?.set || '');
  set('f-shown',      m?.shown || '');
  set('f-set-rate',   m?.setPct || '');
  set('f-show-rate',  m?.showPct || '');
  set('f-close-rate', m?.closePct || '');
  set('f-total-close',m?.totalClosePct || '');
  set('f-adspend',    m?.adSpend || '');
  set('f-cpl',        m?.cpl || '');
  set('f-cpc',        m?.cpc || '');

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function g(id) { return parseFloat(document.getElementById(id).value) || 0; }
function gs(id){ return document.getElementById(id).value.trim(); }

function saveMonth() {
  const monthLabel = gs('f-month');
  if (!monthLabel) { alert('Please enter a month name (e.g. Mar 2026)'); return; }

  const record = {
    month: monthLabel,
    rev:          g('f-rev'),
    opex:         g('f-opex'),
    payroll:      g('f-payroll'),
    profit:       g('f-profit'),
    opexPct:      g('f-opex-pct'),
    payrollPct:   g('f-payroll-pct'),
    profitPct:    g('f-profit-pct'),
    members:      g('f-members'),
    paying:       g('f-paying'),
    cancel:       g('f-cancel'),
    attritionPct: g('f-attrition'),
    arm:          g('f-arm'),
    closed:       g('f-closed'),
    leads:        g('f-leads'),
    set:          g('f-set'),
    shown:        g('f-shown'),
    setPct:       g('f-set-rate'),
    showPct:      g('f-show-rate'),
    closePct:     g('f-close-rate'),
    totalClosePct:g('f-total-close'),
    adSpend:      g('f-adspend'),
    cpl:          g('f-cpl'),
    cpc:          g('f-cpc'),
  };

  if (editingIdx !== null) {
    DB.months[editingIdx] = record;
    selectedIdx = editingIdx;
  } else {
    DB.months.push(record);
    selectedIdx = DB.months.length - 1;
  }

  saveData(DB);
  closeModal();
  buildMonthBar();
  render();
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── init ──────────────────────────────────────────────────────────────────
buildMonthBar();
render();
</script>
